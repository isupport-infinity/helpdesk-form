<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCare Helpdesk — เปิดเคสใหม่</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding: 16px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    overflow: hidden;
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    background: #1a73e8;
    padding: 20px 24px;
    color: #fff;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }
  .body { padding: 24px; }
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, select, textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    font-size: 14px;
    color: #111827;
    outline: none;
    transition: border 0.2s;
    background: #fff;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #1a73e8;
  }
  select:disabled { background: #f3f4f6; color: #9ca3af; }
  textarea { resize: vertical; min-height: 80px; }

  /* Autocomplete */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #fff;
    border: 1.5px solid #e5e7eb;
    border-top: none;
    border-radius: 0 0 8px 8px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 100;
    display: none;
  }
  .autocomplete-list div {
    padding: 10px 14px;
    font-size: 14px;
    cursor: pointer;
    color: #111827;
  }
  .autocomplete-list div:hover { background: #f0f4f8; }

  /* Quick Templates */
  .templates {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tpl-btn {
    background: #eff6ff;
    color: #1a73e8;
    border: 1.5px solid #bfdbfe;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tpl-btn:hover { background: #1a73e8; color: #fff; border-color: #1a73e8; }

  /* Speech */
  .input-row { display: flex; gap: 8px; align-items: flex-start; }
  .input-row input { flex: 1; }
  .mic-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid #e5e7eb;
    background: #fff;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .mic-btn.recording { background: #fee2e2; border-color: #ef4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

  /* Severity */
  .severity-group { display: flex; gap: 8px; }
  .sev-btn {
    flex: 1;
    padding: 10px 4px;
    border-radius: 8px;
    border: 1.5px solid #e5e7eb;
    background: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: #6b7280;
  }
  .sev-btn[data-val="Low"].active    { background:#dcfce7; border-color:#16a34a; color:#16a34a; }
  .sev-btn[data-val="Medium"].active { background:#fef9c3; border-color:#ca8a04; color:#ca8a04; }
  .sev-btn[data-val="High"].active   { background:#ffedd5; border-color:#ea580c; color:#ea580c; }
  .sev-btn[data-val="Critical"].active { background:#fee2e2; border-color:#dc2626; color:#dc2626; }

  /* Section divider */
  .section-divider {
    border: none;
    border-top: 1px dashed #e5e7eb;
    margin: 4px 0 18px;
  }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .submit-btn:hover { background: #1557b0; }
  .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }

  /* Success */
  .success-screen {
    display: none;
    text-align: center;
    padding: 48px 24px;
  }
  .success-icon { font-size: 56px; margin-bottom: 16px; }
  .case-id-box {
    background: #eff6ff;
    border: 2px solid #1a73e8;
    border-radius: 12px;
    padding: 16px;
    margin: 16px 0;
  }
  .case-id-box .label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .case-id-box .value { font-size: 28px; font-weight: 800; color: #1a73e8; }
  .success-detail { font-size: 13px; color: #6b7280; line-height: 1.6; }
  .new-case-btn {
    margin-top: 24px;
    padding: 12px 32px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .footer {
    background: #f8fafc;
    padding: 12px 24px;
    text-align: center;
    font-size: 11px;
    color: #9ca3af;
    border-top: 1px solid #f0f0f0;
  }

  /* Loading */
  .loading { display: none; text-align: center; padding: 48px 24px; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e5e7eb;
    border-top-color: #1a73e8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🎫 เปิดเคสใหม่</h1>
    <p>iCare Support — Infinity Solution Service</p>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    <p style="color:#6b7280;font-size:14px;">กำลังโหลด...</p>
  </div>

  <!-- Form -->
  <div class="body" id="formBody">

    <!-- Engineer (dropdown from SharePoint) -->
    <div class="field">
      <label>👤 Engineer</label>
      <select id="engineerSelect" onchange="onEngineerChange()">
        <option value="">-- เลือก Engineer --</option>
      </select>
    </div>

    <!-- Customer -->
    <div class="field">
      <label>🏢 ชื่อลูกค้า / บริษัท</label>
      <div class="autocomplete-wrap">
        <input type="text" id="customerInput" placeholder="พิมพ์ชื่อลูกค้า..." autocomplete="off"/>
        <div class="autocomplete-list" id="autocompleteList"></div>
        <input type="hidden" id="customerValue"/>
      </div>
    </div>

    <!-- PO Number (loaded after customer selected) -->
    <div class="field">
      <label>📄 PO Number</label>
      <select id="poSelect" onchange="onPOChange()" disabled>
        <option value="">-- เลือกลูกค้าก่อน --</option>
      </select>
    </div>

    <!-- Sender / Contact (loaded after customer selected) -->
    <div class="field">
      <label>👥 ผู้แจ้ง (Sender)</label>
      <select id="contactSelect" onchange="onContactChange()" disabled>
        <option value="">-- เลือกลูกค้าก่อน --</option>
      </select>
    </div>

    <hr class="section-divider"/>

    <!-- Product -->
    <div class="field">
      <label>📦 Product</label>
      <select id="productSelect">
        <option value="">-- เลือก Product --</option>
      </select>
    </div>

    <!-- Quick Templates -->
    <div class="field">
      <label>⚡ Quick Templates</label>
      <div class="templates">
        <button class="tpl-btn" onclick="setTemplate('Product Status Down')">Product Status Down</button>
        <button class="tpl-btn" onclick="setTemplate('Cannot Backup Data as usual')">Cannot Backup Data</button>
        <button class="tpl-btn" onclick="setTemplate('User Password Expired')">Password Expired</button>
        <button class="tpl-btn" onclick="setTemplate('Certificate has expired')">Certificate Expired</button>
      </div>
    </div>

    <!-- Case Title + Speech -->
    <div class="field">
      <label>📋 หัวข้อปัญหา</label>
      <div class="input-row">
        <input type="text" id="caseTitle" placeholder="สรุปปัญหาสั้นๆ..."/>
        <button class="mic-btn" id="micBtn" onclick="toggleSpeech('title')" title="พิมพ์ด้วยเสียง">🎤</button>
      </div>
    </div>

    <!-- Detail + Speech -->
    <div class="field">
      <label>📝 รายละเอียดเพิ่มเติม (ถ้ามี)</label>
      <div class="input-row">
        <textarea id="caseDetail" placeholder="รายละเอียดเพิ่มเติม..." style="flex:1;"></textarea>
        <button class="mic-btn" id="micBtnDetail" onclick="toggleSpeech('detail')" title="พิมพ์ด้วยเสียง">🎤</button>
      </div>
    </div>

    <!-- Severity -->
    <div class="field">
      <label>🔥 Severity</label>
      <div class="severity-group">
        <button class="sev-btn" data-val="Low" onclick="setSeverity('Low')">🟢 Low</button>
        <button class="sev-btn" data-val="Medium" onclick="setSeverity('Medium')">🟡 Medium</button>
        <button class="sev-btn" data-val="High" onclick="setSeverity('High')">🟠 High</button>
        <button class="sev-btn" data-val="Critical" onclick="setSeverity('Critical')">🔴 Critical</button>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitCase()">🎫 บันทึกเคส</button>
  </div>

  <!-- Success Screen -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">✅</div>
    <h2 style="font-size:20px;font-weight:700;color:#111827;margin-bottom:8px;">เปิดเคสสำเร็จ!</h2>
    <div class="case-id-box">
      <div class="label">Case ID</div>
      <div class="value" id="resultCaseId">—</div>
    </div>
    <div class="success-detail" id="resultDetail"></div>
    <button class="new-case-btn" onclick="resetForm()">+ เปิดเคสใหม่</button>
  </div>

  <div class="footer">INFINITY SOLUTION SERVICE CO., LTD. | iCare Support</div>
</div>

<script>
// ===== CONFIG =====
const GET_CUSTOMERS_URL  = 'https://default1e85b452905e4ec2805a39cf81ea8d.95.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/47424e018b844768a24d414d7048c9b0/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=FcrNMg3nPeMtX67OPxS2chrO9fXabbx5XfGotWFVF3s';
const GET_ENGINEERS_URL  = 'https://default1e85b452905e4ec2805a39cf81ea8d.95.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/c26384e3309847528b6b9c428399f777/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=u1CdrG01HdR3M0yyiZTlHzvJgrf3hvOV85oXJNqqVRg';
const CREATE_CASE_URL    = 'https://default1e85b452905e4ec2805a39cf81ea8d.95.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/8afd8b0926294e34b064abb2227dbef3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=necY1Q4WuwGeqj8hBlBS39VPsSijTo7DPlWxt6tGyaU';
const GET_PO_URL         = 'https://default1e85b452905e4ec2805a39cf81ea8d.95.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/dcebd4805f854ba0993c64f64bd4c73e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=hI2vawIJ7N3g1tyNhbPvHaLMTGlqwqEerAZQtJBRSA4';
const GET_CONTACTS_URL   = 'https://default1e85b452905e4ec2805a39cf81ea8d.95.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ccdec52b30a0434cb419bbbf22ab7d29/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=PtHbnOYBCXY5H9ZvB1sypv-L7bAZML6XLlpcRDpAb94';
const GET_PRODUCTS_URL   = 'https://default1e85b452905e4ec2805a39cf81ea8d.95.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/b703a8fc164e456fa7b94adc43b90702/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=TBkId07JFhoGeYkt2vhMAf7yoT9b2kWoo5qoxBcNDlw';
const LIFF_ID = '2010461953-5RXVNllu';

// ===== STATE =====
let customers = [];
let engineers = [];
let pos = [];
let contacts = [];
let products = [];
let selectedSeverity   = '';
let selectedPONumber   = '';
let selectedContact    = { name: '', email: '' };
let engineerProfile    = { name: '', email: '' };
let recognition        = null;
let isRecording        = false;
let activeRecordField  = null;

// ===== INIT =====
async function init() {
  document.getElementById('loadingScreen').style.display = 'block';
  document.getElementById('formBody').style.display = 'none';

  try {
    await liff.init({ liffId: LIFF_ID });
  } catch(e) {}

  await Promise.all([loadCustomers(), loadEngineers(), loadProducts()]);

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('formBody').style.display = 'block';
}

// ===== LOAD CUSTOMERS =====
async function loadCustomers() {
  try {
    const res = await fetch(GET_CUSTOMERS_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    const data = await res.json();
    customers = Array.isArray(data) ? data : (data.value || []);
  } catch(e) {
    customers = [];
  }
}

// ===== LOAD ENGINEERS =====
async function loadEngineers() {
  try {
    const res = await fetch(GET_ENGINEERS_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    const data = await res.json();
    engineers = Array.isArray(data) ? data : (data.value || []);
    const sel = document.getElementById('engineerSelect');
    engineers.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.email;
      opt.textContent = e.name;
      opt.dataset.name = e.name;
      sel.appendChild(opt);
    });
  } catch(e) {
    engineers = [];
  }
}

function onEngineerChange() {
  const sel = document.getElementById('engineerSelect');
  const opt = sel.options[sel.selectedIndex];
  engineerProfile.email = sel.value;
  engineerProfile.name  = opt ? opt.dataset.name : '';
}

// ===== LOAD PRODUCTS (on init) =====
async function loadProducts() {
  const productSelect = document.getElementById('productSelect');
  try {
    const res = await fetch(GET_PRODUCTS_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: '{}'
    });
    const data = await res.json();
    products = Array.isArray(data) ? data : (data.value || []);
    productSelect.innerHTML = '<option value="">-- เลือก Product --</option>';
    products.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.product || '';
      opt.textContent = p.product || '';
      productSelect.appendChild(opt);
    });
  } catch(e) {
    productSelect.innerHTML = '<option value="">-- โหลดไม่สำเร็จ --</option>';
  }
}

// ===== LOAD PO (after customer selected) =====
async function loadPO(customerShortName) {
  const poSelect = document.getElementById('poSelect');
  poSelect.innerHTML = '<option value="">-- กำลังโหลด... --</option>';
  poSelect.disabled = true;
  try {
    const res = await fetch(GET_PO_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ customerShortName })
    });
    const data = await res.json();
    const raw = Array.isArray(data) ? data : (data.value || []);
    // Keep only latest EndDate per PONumber
    const poMap = {};
    raw.forEach(p => {
      const key = `${p.poCustomer}|${p.poDescription}`;
      if (!poMap[key] || p.endDate > poMap[key].endDate) {
        poMap[key] = p;
      }
    });
    pos = Object.values(poMap).sort((a, b) =>
      (a.poCustomer || '').localeCompare(b.poCustomer || '') ||
      (a.poDescription || '').localeCompare(b.poDescription || '')
    );
    poSelect.innerHTML = '<option value="">-- เลือก PO --</option>';
    pos.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.poNumber || '';
      opt.textContent = `${p.poCustomer || ''} - ${p.poNumber || ''} - ${p.poDescription || ''}`;
      poSelect.appendChild(opt);
    });
    poSelect.disabled = false;
  } catch(e) {
    poSelect.innerHTML = '<option value="">-- โหลดไม่สำเร็จ --</option>';
    poSelect.disabled = false;
  }
}

function onPOChange() {
  selectedPONumber = document.getElementById('poSelect').value;
}

// ===== LOAD CONTACTS (after customer selected) =====
async function loadContacts(customerShortName) {
  const contactSelect = document.getElementById('contactSelect');
  contactSelect.innerHTML = '<option value="">-- กำลังโหลด... --</option>';
  contactSelect.disabled = true;
  try {
    const res = await fetch(GET_CONTACTS_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ customerShortName })
    });
    const data = await res.json();
    contacts = Array.isArray(data) ? data : (data.value || []);
    contactSelect.innerHTML = '<option value="">-- เลือกผู้แจ้ง --</option>';
    contacts.forEach((c, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${c.companyName || ''} - ${c.contactName || ''}`;
      contactSelect.appendChild(opt);
    });
    contactSelect.disabled = false;
  } catch(e) {
    contactSelect.innerHTML = '<option value="">-- โหลดไม่สำเร็จ --</option>';
    contactSelect.disabled = false;
  }
}

function onContactChange() {
  const sel = document.getElementById('contactSelect');
  const idx = parseInt(sel.value);
  if (!isNaN(idx) && contacts[idx]) {
    selectedContact = { name: contacts[idx].contactName || '', email: contacts[idx].email || '' };
  } else {
    selectedContact = { name: '', email: '' };
  }
}

// ===== AUTOCOMPLETE =====
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('customerInput');
  const list  = document.getElementById('autocompleteList');

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase();
    list.innerHTML = '';
    if (!q) { list.style.display = 'none'; return; }
    const matches = customers.filter(c => c.name && c.name.toLowerCase().includes(q));
    if (!matches.length) { list.style.display = 'none'; return; }
    matches.forEach(c => {
      const div = document.createElement('div');
      div.textContent = c.name;
      div.onclick = () => {
        input.value = c.name;
        const shortName = c.short || c.name;
        document.getElementById('customerValue').value = shortName;
        list.style.display = 'none';
        // Reset dependent dropdowns
        selectedPONumber = '';
        selectedContact = { name: '', email: '' };
        // Load PO + Contacts for selected customer
        loadPO(shortName);
        loadContacts(shortName);
      };
      list.appendChild(div);
    });
    list.style.display = 'block';
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.autocomplete-wrap')) list.style.display = 'none';
  });

  init();
});

// ===== QUICK TEMPLATES =====
function setTemplate(text) {
  document.getElementById('caseTitle').value = text;
}

// ===== SEVERITY =====
function setSeverity(val) {
  selectedSeverity = val;
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sev-btn[data-val="${val}"]`).classList.add('active');
}

// ===== SPEECH TO TEXT =====
function toggleSpeech(field) {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Browser ไม่รองรับ Speech-to-Text ครับ'); return;
  }
  const targetId = field === 'detail' ? 'caseDetail' : 'caseTitle';
  const micId    = field === 'detail' ? 'micBtnDetail' : 'micBtn';

  if (isRecording && activeRecordField === field) {
    recognition.stop(); return;
  }
  if (isRecording) { recognition.stop(); }

  activeRecordField = field;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'th-TH';
  recognition.interimResults = false;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById(micId).classList.add('recording');
    document.getElementById(micId).textContent = '⏹';
  };
  recognition.onresult = e => {
    const el = document.getElementById(targetId);
    el.value = (el.value ? el.value + ' ' : '') + e.results[0][0].transcript;
  };
  recognition.onend = () => {
    isRecording = false;
    activeRecordField = null;
    document.getElementById(micId).classList.remove('recording');
    document.getElementById(micId).textContent = '🎤';
  };
  recognition.start();
}

// ===== SUBMIT =====
async function submitCase() {
  const customer = document.getElementById('customerValue').value || document.getElementById('customerInput').value;
  const title    = document.getElementById('caseTitle').value.trim();
  const detail   = document.getElementById('caseDetail').value.trim();
  const product  = document.getElementById('productSelect').value;

  if (!engineerProfile.email) { alert('กรุณาเลือก Engineer'); return; }
  if (!customer)  { alert('กรุณาเลือกชื่อลูกค้า'); return; }
  if (!title)     { alert('กรุณาใส่หัวข้อปัญหา'); return; }
  if (!selectedSeverity) { alert('กรุณาเลือก Severity'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังบันทึก...';

  try {
    const payload = {
      customerShortName: customer,
      caseTitle:         title,
      severity:          selectedSeverity,
      engineerEmail:     engineerProfile.email,
      engineerName:      engineerProfile.name,
      detail:            detail,
      poNumber:          selectedPONumber,
      product:           product,
      senderName:        selectedContact.name,
      senderEmail:       selectedContact.email
    };
    const res  = await fetch(CREATE_CASE_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    const caseId = data.caseId || 'N/A';

    document.getElementById('resultCaseId').textContent = caseId;
    document.getElementById('resultDetail').innerHTML =
      `<b>${customer}</b><br>${title}<br>Severity: ${selectedSeverity}` +
      (selectedContact.name ? `<br>ผู้แจ้ง: ${selectedContact.name}` : '');
    document.getElementById('formBody').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
  } catch(e) {
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
    btn.disabled = false;
    btn.textContent = '🎫 บันทึกเคส';
  }
}

// ===== RESET =====
function resetForm() {
  document.getElementById('customerInput').value = '';
  document.getElementById('customerValue').value = '';
  document.getElementById('caseTitle').value = '';
  document.getElementById('caseDetail').value = '';
  document.getElementById('poSelect').innerHTML = '<option value="">-- เลือกลูกค้าก่อน --</option>';
  document.getElementById('poSelect').disabled = true;
  document.getElementById('contactSelect').innerHTML = '<option value="">-- เลือกลูกค้าก่อน --</option>';
  document.getElementById('contactSelect').disabled = true;
  document.getElementById('productSelect').selectedIndex = 0;
  selectedSeverity  = '';
  selectedPONumber  = '';
  selectedContact   = { name: '', email: '' };
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('engineerSelect').selectedIndex = 0;
  engineerProfile = { name: '', email: '' };
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = '🎫 บันทึกเคส';
  document.getElementById('successScreen').style.display = 'none';
  document.getElementById('formBody').style.display = 'block';
}
</script>
